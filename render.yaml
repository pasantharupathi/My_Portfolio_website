# render.yaml — Render Blueprint for automatic deployment
# Place this in the root of your GitHub repo
# See: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: portfolio-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: RESEND_API_KEY
        sync: false    # Set manually in Render dashboard (your Resend API key)
      - key: EMAIL_USER
        sync: false    # The email address where contact notifications are delivered
      - key: CLIENT_URL
        sync: false    # Your Vercel frontend URL (e.g. https://your-portfolio.vercel.app)
      - key: GITHUB_USERNAME
        value: pasantharupathi
      - key: GITHUB_TOKEN
        sync: false    # Optional — increases GitHub API rate limit
